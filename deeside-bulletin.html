<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deeside Bulletin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #e8541a;
      --black: #111111;
      --mid: #555555;
      --light: #999999;
      --rule: #e2e2e2;
      --bg: #f8f7f5;
    }

    body {
      background: var(--bg);
      color: var(--black);
      font-family: 'IBM Plex Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* BULLETIN STRIP */
    .bulletin-strip {
      background: var(--orange);
      padding: 8px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .bulletin-label {
      font-size: 13px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .bulletin-datetime {
      font-size: 12px;
      font-weight: 500;
      color: rgba(255,255,255,0.85);
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    /* FEED */
    .feed {
      max-width: 640px;
      margin: 0 auto;
      padding: 0 16px 40px;
    }

    /* STORY */
    .story {
      padding: 20px 0;
      border-bottom: 1px solid var(--rule);
      display: grid;
      grid-template-columns: 32px 1fr;
      gap: 0 12px;
      animation: fadeUp 0.3s ease both;
    }

    .story:first-child { padding-top: 20px; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .story:nth-child(1) { animation-delay: 0.05s; }
    .story:nth-child(2) { animation-delay: 0.10s; }
    .story:nth-child(3) { animation-delay: 0.15s; }
    .story:nth-child(4) { animation-delay: 0.20s; }
    .story:nth-child(5) { animation-delay: 0.25s; }

    .story-num {
      font-family: 'DM Serif Display', serif;
      font-size: 26px;
      color: var(--rule);
      line-height: 1;
      padding-top: 3px;
      user-select: none;
    }

    .story-body { min-width: 0; }

    .story-tag {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--orange);
      margin-bottom: 6px;
    }

    .story-headline {
      font-family: 'DM Serif Display', serif;
      font-size: 18px;
      line-height: 1.3;
      color: var(--black);
      margin-bottom: 8px;
    }

    .story-headline a { color: inherit; text-decoration: none; }
    .story-headline a:hover { color: var(--orange); }

    .story-summary {
      font-size: 14px;
      line-height: 1.6;
      color: var(--mid);
      margin-bottom: 10px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .story-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .story-time { font-size: 12px; color: var(--light); }

    .story-link {
      font-size: 12px;
      font-weight: 600;
      color: var(--black);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .story-link:hover { color: var(--orange); }
    .story-link:hover svg { transform: translateX(2px); }
    .story-link svg { width: 11px; height: 11px; transition: transform 0.15s ease; }

    /* STATES */
    .loading { padding: 36px 16px; text-align: center; }

    .loading-dot {
      display: inline-block;
      width: 7px; height: 7px;
      background: var(--orange);
      border-radius: 50%;
      margin: 0 3px;
      animation: pulse 1.2s ease-in-out infinite;
    }

    .loading-dot:nth-child(2) { animation-delay: 0.2s; }
    .loading-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40%           { transform: scale(1);   opacity: 1;   }
    }

    .message-state {
      padding: 28px 16px;
      font-size: 14px;
      color: var(--mid);
      line-height: 1.6;
    }

    .message-state a { color: var(--orange); }

    /* FOOTER */
    .bulletin-footer {
      padding: 16px 16px 32px;
      max-width: 640px;
      margin: 0 auto;
      border-top: 2px solid var(--black);
      display: flex;
      justify-content: flex-end;
    }

    .bulletin-footer a {
      font-size: 12px;
      font-weight: 600;
      color: var(--mid);
      text-decoration: none;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .bulletin-footer a:hover { color: var(--orange); }
  </style>
</head>
<body>

  <div class="bulletin-strip">
    <span class="bulletin-label">Bulletin:</span>
    <span class="bulletin-datetime" id="bulletin-datetime"></span>
  </div>

  <main class="feed" id="feed">
    <div class="loading">
      <div class="loading-dot"></div>
      <div class="loading-dot"></div>
      <div class="loading-dot"></div>
    </div>
  </main>

  <footer class="bulletin-footer" id="bulletin-footer" style="display:none">
    <a href="https://www.deeside.com" target="_parent">All stories on Deeside.com &#8594;</a>
  </footer>

  <script>
    // Reads from n8n-maintained cache on GitHub. n8n fetches from WordPress
    // every 15 minutes and commits bulletin.json to this repo.
    const CACHE_URL = 'https://raw.githubusercontent.com/jonathansheppard/newsroom-tools/main/bulletin.json';

    function setDatetime() {
      var now  = new Date();
      var date = now.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });
      var time = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
      document.getElementById('bulletin-datetime').textContent = date + ' \u00b7 ' + time;
    }

    function relativeTime(dateStr) {
      var now      = new Date();
      var date     = new Date(dateStr + 'Z');
      var diffMs   = now - date;
      var diffMins = Math.floor(diffMs / 60000);
      var diffHrs  = Math.floor(diffMins / 60);
      var diffDays = Math.floor(diffHrs / 24);
      if (diffMins < 2)   return 'Just now';
      if (diffMins < 60)  return diffMins + ' minutes ago';
      if (diffHrs === 1)  return '1 hour ago';
      if (diffHrs < 24)   return diffHrs + ' hours ago';
      if (diffDays === 1) return 'Yesterday';
      return date.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
    }

    function arrow() {
      return '<svg viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M1 6h10M7 2l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    }

    function renderStory(story, index) {
      var num  = String(index + 1).padStart(2, '0');
      var time = relativeTime(story.date);
      return '<article class="story">'
        + '<div class="story-num" aria-hidden="true">' + num + '</div>'
        + '<div class="story-body">'
        + '<span class="story-tag">' + (story.tag || 'News') + '</span>'
        + '<h2 class="story-headline"><a href="' + story.url + '" target="_parent" rel="noopener">' + story.title + '</a></h2>'
        + (story.summary ? '<p class="story-summary">' + story.summary + '</p>' : '')
        + '<div class="story-footer">'
        + '<span class="story-time">' + time + '</span>'
        + '<a href="' + story.url + '" target="_parent" rel="noopener" class="story-link">Full story ' + arrow() + '</a>'
        + '</div></div></article>';
    }

    async function loadBulletin() {
      setDatetime();
      try {
        // Cache-bust with timestamp so GitHub's CDN doesn't serve stale JSON
        var res  = await fetch(CACHE_URL + '?t=' + Date.now());
        if (!res.ok) throw new Error(res.status);
        var data = await res.json();

        var stories = data.stories || [];

        if (stories.length === 0) {
          document.getElementById('feed').innerHTML = '<div class="message-state">No bulletin stories today. <a href="https://www.deeside.com" target="_parent">Browse all local news \u2192</a></div>';
          return;
        }

        document.getElementById('feed').innerHTML = stories.map(renderStory).join('');
        document.getElementById('bulletin-footer').style.display = 'flex';

      } catch(err) {
        console.error('Bulletin fetch error:', err);
        document.getElementById('feed').innerHTML = '<div class="message-state">Unable to load today\'s bulletin. <a href="https://www.deeside.com" target="_parent">Visit Deeside.com \u2192</a></div>';
      }
    }

    loadBulletin();

    // Report height to parent so WordPress template can auto-resize the iframe
    function reportHeight() {
      var h = document.body.scrollHeight;
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({ type: "bulletin-height", height: h }, "*");
      }
    }
    // Report after content loads and again after images settle
    setTimeout(reportHeight, 800);
    setTimeout(reportHeight, 2000);
  </script>
</body>
</html>
